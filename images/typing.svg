<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 60" width="100%" height="100%" role="img" aria-label="Role Transition: Data Analyst, Business Intelligence, Marketing Analytics, Decision Support, Data Storytelling">
  <!-- CSS Animations (SMIL Fallback embedded inside text tags) -->
  <g transform="translate(0, 36)">
    <!-- Text 1: Data Analyst -->
    <text x="40" y="0" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="800" fill="#008EA6" letter-spacing="0.05em" opacity="1">
      DATA ANALYST
      <animate attributeName="opacity" values="1;1;0;0;0;1" keyTimes="0;0.16;0.20;0.96;0.98;1" dur="10s" repeatCount="indefinite" />
    </text>

    <!-- Text 2: Business Intelligence -->
    <text x="40" y="0" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="800" fill="#008EA6" letter-spacing="0.05em" opacity="0">
      BUSINESS INTELLIGENCE DEVELOPER
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.16;0.20;0.36;0.40;1" dur="10s" repeatCount="indefinite" />
    </text>

    <!-- Text 3: Marketing Analytics -->
    <text x="40" y="0" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="800" fill="#822659" letter-spacing="0.05em" opacity="0">
      MARKETING ANALYTICS EXPERT
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.36;0.40;0.56;0.60;1" dur="10s" repeatCount="indefinite" />
    </text>

    <!-- Text 4: Decision Support -->
    <text x="40" y="0" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="800" fill="#008EA6" letter-spacing="0.05em" opacity="0">
      DECISION SUPPORT SYSTEM BUILDER
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.56;0.60;0.76;0.80;1" dur="10s" repeatCount="indefinite" />
    </text>

    <!-- Text 5: Data Storyteller -->
    <text x="40" y="0" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="800" fill="#822659" letter-spacing="0.05em" opacity="0">
      DATA STORYTELLER &amp; STRATEGIST
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.76;0.80;0.96;0.98;1" dur="10s" repeatCount="indefinite" />
    </text>
  </g>
</svg>
