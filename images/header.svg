<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="100%" height="100%" role="img" aria-label="Amr Mousa — Data &amp; Marketing Analyst — Turning Data Into Decisions. Turning Decisions Into Growth.">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Mesh Glow Gradients -->
    <radialGradient id="glow-teal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#004D61" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#004D61" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-berry" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#822659" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#822659" stop-opacity="0" />
    </radialGradient>

    <!-- Border Accent Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#004D61" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#822659" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#004D61" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="880" height="340" rx="12" fill="url(#bg-grad)" />

  <!-- Ambient Glow Orbs -->
  <circle cx="100" cy="80" r="320" fill="url(#glow-teal)" />
  <circle cx="780" cy="260" r="300" fill="url(#glow-berry)" />

  <!-- Card Border Outline -->
  <rect x="1" y="1" width="878" height="338" rx="11" fill="none" stroke="url(#border-grad)" stroke-width="1.5" />

  <!-- Decorative Grid Lines (SaaS feel) -->
  <path d="M 0,80 L 880,80 M 0,160 L 880,160 M 0,240 L 880,240 M 160,0 L 160,340 M 320,0 L 320,340 M 480,0 L 480,340 M 640,0 L 640,340" stroke="rgba(255, 255, 255, 0.015)" stroke-width="1" />

  <!-- Active Status Badge -->
  <g transform="translate(40, 40)">
    <rect width="186" height="26" rx="13" fill="#1E2A3A" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    <circle cx="18" cy="13" r="4.5" fill="#10B981">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="32" y="17" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" fill="#F0F0F0" letter-spacing="0.08em">OPEN TO PARTNERSHIPS</text>
  </g>

  <!-- Title & Name -->
  <text x="40" y="130" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="46" font-weight="900" fill="#F0F0F0" letter-spacing="-0.03em">AMR MOUSA</text>
  <text x="40" y="165" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#008EA6" letter-spacing="0.08em">DATA &amp; MARKETING ANALYST</text>

  <!-- Personal Brand Thread Slogan -->
  <text x="40" y="222" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="24" font-weight="700" fill="#F0F0F0" letter-spacing="-0.01em">
    Turning Data Into Decisions. Turning Decisions Into Growth.
  </text>

  <!-- Skill / Domain Tag Bar -->
  <text x="40" y="278" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#9CA3AF" letter-spacing="0.05em">
    SQL  ·  POWER BI  ·  PYTHON  ·  MARKETING ANALYTICS  ·  BUSINESS INTELLIGENCE
  </text>

  <!-- Abstract Node Graphic (Right Side) -->
  <g transform="translate(680, 50)" opacity="0.45">
    <line x1="20" y1="90" x2="80" y2="50" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="2,2" />
    <line x1="80" y1="50" x2="140" y2="110" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" />
    <line x1="20" y1="90" x2="70" y2="160" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" />
    <line x1="70" y1="160" x2="140" y2="110" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" />
    <line x1="80" y1="50" x2="70" y2="160" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="2,2" />

    <circle cx="20" cy="90" r="5" fill="#004D61" />
    <circle cx="80" cy="50" r="8" fill="#822659" />
    <circle cx="140" cy="110" r="6" fill="#004D61" />
    <circle cx="70" cy="160" r="7" fill="#822659" />
  </g>
</svg>
